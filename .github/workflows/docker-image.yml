name: Docker Image CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    # this event is submited via github.com/bots-house/github-actions-upstream-watch
    types: upstream_commit
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps: 
      -
        name: Checkout
        uses: actions/checkout@v2
        
      - name: Checkout upstream repo 
        uses: actions/checkout@v2
        with:
          repository: nxtrace/NTrace-core
          path: upstream
          submodules: recursive  
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - 
        name: Get Latest Tag Of Upstream Source Code
        id: download
        run: |
          # Try to extract the first release tag_name from the GitHub API
          RELEASE_TAG=$(curl -s "https://api.github.com/repos/nxtrace/NTrace-core/releases" \
            | grep -m1 '"tag_name"' \
            | sed -E 's/.*"([^"]+)".*/\1/')

          if [ -z "$RELEASE_TAG" ]; then
            echo "No upstream release tag found; falling back to 'latest'"
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          else
            # remove leading 'v' if present
            echo "latest_tag=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT
          fi
      -
        name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push 
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nxtrace:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nxtrace:${{ steps.download.outputs.latest_tag }}
